name: Build and Test
on:
  pull_request:
    paths-ignore:
      - docs/**
      - deploy/**
      - examples/**
      - '*.md'
jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: go.sum
      - name: Run Lint and Test Coverage
        shell: bash
        run: |
          make lint
          make test-coverage
      - name: Run govulncheck
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Server-side Moby daemon vulns reachable only via init() chains.
          # Pumba is a client-only consumer; exploitable symbols are never called.
          # No upstream fix released — revisit when github.com/docker/docker ships a fix.
          accepted=("GO-2026-4887" "GO-2026-4883")
          govulncheck ./... 2>&1 | tee govulncheck.txt || true
          ids=$(sed -nE 's/^Vulnerability #[0-9]+: (GO-[0-9]{4}-[0-9]+).*/\1/p' govulncheck.txt | sort -u)
          unexpected=""
          for id in $ids; do
            skip=0
            for a in "${accepted[@]}"; do [ "$id" = "$a" ] && skip=1 && break; done
            [ "$skip" = 0 ] && unexpected="$unexpected $id"
          done
          if [ -n "$unexpected" ]; then
            echo "::error::Unaccepted vulnerabilities:$unexpected"
            exit 1
          fi
          [ -n "$ids" ] && echo "::notice::Only pre-accepted vulnerabilities present:$ids"
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: .cover/tests.xml
          commit: ${{ github.sha }}
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: .cover/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
  integration:
    name: Integration Tests
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: go.sum
      - name: Build Pumba Binary
        run: make build TARGETARCH="$(dpkg --print-architecture)"
      - name: Install Pumba
        run: sudo install -m 755 .bin/github.com/alexei-led/pumba /usr/local/bin/pumba
      - name: Install Bats and Libraries
        uses: bats-core/bats-action@4.0.0
        with:
          support-path: /usr/local/lib/bats-support
          assert-path: /usr/local/lib/bats-assert
          detik-install: false
          file-install: false
      - name: Pull Test Images
        run: |
          docker pull alpine:latest &
          docker pull ghcr.io/alexei-led/pumba-alpine-nettools:latest &
          wait
      - name: Warm Up Docker Runtime
        run: |
          docker run --rm alpine:latest true
          cid=$(docker create --rm alpine:latest sleep 10)
          docker run --rm --net="container:${cid}" ghcr.io/alexei-led/pumba-alpine-nettools:latest true 2>/dev/null || true
          docker rm -f "${cid}" 2>/dev/null || true
      - name: Install GNU Parallel
        run: sudo apt-get update && sudo apt-get install -y parallel
      - name: Run Docker Integration Tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 2
          command: |
            shopt -s extglob
            sudo env "PATH=$PATH" bats --jobs 4 --no-parallelize-within-files \
              --print-output-on-failure tests/!(containerd_*).bats
      - name: Setup Containerd
        run: |
          if command -v containerd &>/dev/null; then
            echo "containerd already installed: $(containerd --version)"
          else
            echo "Installing containerd..."
            arch=$(dpkg --print-architecture)
            version="2.0.4"
            url="https://github.com/containerd/containerd/releases/download/v${version}/containerd-${version}-linux-${arch}.tar.gz"
            curl -fsSL "$url" | sudo tar -xz -C /usr/local
          fi
          if ! systemctl is-active --quiet containerd 2>/dev/null; then
            sudo mkdir -p /etc/containerd
            containerd config default | sudo tee /etc/containerd/config.toml >/dev/null
            sudo systemctl enable --now containerd || sudo containerd &
            sleep 2
          fi
          sudo ctr version
      - name: Run Containerd Integration Tests
        run: |
          if [ -S /run/containerd/containerd.sock ]; then
            sudo env "PATH=$PATH" bats --jobs 4 --no-parallelize-within-files \
              --print-output-on-failure tests/containerd_*.bats
          else
            echo "Containerd socket not available, skipping containerd tests"
          fi
  integration-tests-podman:
    name: Integration Tests (Podman)
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: go.sum
      - name: Install Podman and GNU Parallel
        run: |
          sudo apt-get update
          sudo apt-get install -y podman parallel
          podman --version
      - name: Install Bats and Libraries
        uses: bats-core/bats-action@4.0.0
        with:
          support-path: /usr/local/lib/bats-support
          assert-path: /usr/local/lib/bats-assert
          detik-install: false
          file-install: false
      - name: Enable Rootful Podman Socket
        run: |
          sudo systemctl enable --now podman.socket
          sudo ls -l /run/podman/podman.sock
          sudo podman info
      - name: Build Pumba Binary
        run: make build TARGETARCH="$(dpkg --print-architecture)"
      - name: Install Pumba
        run: sudo install -m 755 .bin/github.com/alexei-led/pumba /usr/local/bin/pumba
      - name: Pull Test Images
        run: |
          sudo podman pull docker.io/library/alpine:latest &
          sudo podman pull ghcr.io/alexei-led/pumba-alpine-nettools:latest &
          sudo podman pull ghcr.io/alexei-led/stress-ng:latest &
          sudo podman pull docker.io/nicolaka/netshoot:latest &
          wait
      - name: Run Podman Integration Tests
        run: |
          set -o pipefail
          sudo env "PATH=$PATH" bats --jobs 4 --no-parallelize-within-files \
            --print-output-on-failure tests/podman_*.bats 2>&1 | tee podman-bats.log
      - name: Collect Podman Journal on Failure
        if: failure()
        run: |
          sudo journalctl -u podman.socket --no-pager 2>&1 | tee podman-socket-journal.log >/dev/null || true
          sudo journalctl -u podman.service --no-pager 2>&1 | tee podman-service-journal.log >/dev/null || true
          sudo podman ps -a 2>&1 | tee podman-ps.log >/dev/null || true
      - name: Upload Podman Test Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: podman-integration-logs
          path: |
            podman-bats.log
            podman-socket-journal.log
            podman-service-journal.log
            podman-ps.log
          retention-days: 7
          if-no-files-found: ignore
